body:
  text: 大易象數鈎深圖卷下元張理撰困之為卦屬乎九月兊氣用事而臨於戍土澤水為土所壅故大象曰澤無水困也困因兊坎相重而成也兊正秋而坎為冬兊之一隂象乎始得秋氣而蔓草未殺故為葛藟之困六三則秋冬之交蔓草葉脫而刺存焉故為蒺藜之困若初六則在坎之下正大寒之時也蔓草為霜殺而靡有孑遺而所存者株木而已此困三隂爻故係以草木象也井以陽為泉者水因天一之陽而生也坎中之陽出於坎方寒泉也所謂北方生寒寒生水之義也故又曰太陽寒水巽之二陽一在地位而趣下是谷而非井矣一陽雖在人位居甃之下汲之不及不若五爻浮溢于甃上也井欲溢而鼎戒盈此德為器之辨也鼎卦鉉耳趾皆全而趾缺其一所以初爻言鼎顛趾言鼎倒而趾在上也下一隂反有兩耳之象五爻故曰黃耳以别初焉革雖有鼎鬲革生為熟之象然以爐鞴之象為正蓋以離火鼓鑄兊金而金從革也革而後鼎者以鼓鑄而成鼎也夏后氏鑄鼎而湯武因之以寶其器故有湯武革命之象震之六爻初勸之以有戒懼之心而後言笑二又戒之以喪貝而勿逐是欲人內無妄動於一心而外無貪其利也三爻則言震蘇蘇是欲人修慝而辨惑無終入於迷途也皆動心之要也外卦論動之迹故四言遂泥以表事之凝滯而不决五言無喪以表事之成上言征凶以表事之敗艮之象言輔頰不言口言身不言腹言夤限不言臍有背面而立之象故曰艮其背也統一卦而觀之下不分其腓趾上不别其身輔四隂排布宛有背骨之狀上一陽為肩膊中一陽為脊膂也脊膂取其貫中而巳艮之九三艮之主也以陽居陽其性躁動譬之於腰焉俯仰罄折起居行止莫不因之然其運動實係於心也故聖人係之以薰心之象六二以隂居隂其性靜矣有腓象心欲動而腓不能舉行其心安有快意乎故聖人又係之以其心不快之辭漸卦下艮而上巽時當正月立春之後鴻漸來之候矣故六爻皆係以鴻也鴻者隨陽之鳥而艮巽限乎子午之陽方係之以鴻豈不宜哉三居艮卦之上上居巽卦之上是南北二陸也三以一陽限於羣隂之閫當鴻鴈北來之際鳥獸將孳尾之時故有夫征婦孕之象也三與四氣交於人位故孕也若五與二一居于天一處于地逺應而雌雄有别故不孕耳震為蒼筤竹下實而上虛筐象也歸妹之卦與泰相類而人位二爻兩相交互有掩袂之象人之一身左陽而右隂隂陽之交如兩袂之交也娣位乎下其畫陽也君位乎上其畫隂也易以陽善而隂惡陽貴而隂賤此君之袂不如娣之袂矣善以歸妹安行非正也其卦乃遷東方之陽以就西方之隂是震氣入於兊木為金之尅制也故必月幾望而後吉月望則隂敵陽有少陵長賤易貴之變矣所以歸妹之繇唯曰征凶無攸利以行不以正者非聖人之事也伏羲畫震於東而置離於南方者表少陽之氣動於東方太陽之明盛於南方也文王以震重離遂名曰豐言少陽之震運至於南方合太陽之離明而為豐盛耳所以文王於豐繇明盛極必衰之理曰宜日中於豐爻明明極必昏之理曰日中見斗與沫也文王所係卦爻之辭唯日與斗也孔子之彖遂論及月何哉蓋豐卦在五六月之交日在柳宿之度而斗指午未之分柳宿之度實通三辰故有見斗之理六二以中道遂懷資得童僕九四以剛柔相濟而有應遂得資斧皆近利不若六五也離之所以明者順以行其智也故曰畜牝牛吉上九之喪牛是喪其明也旅當夬之後乾之前也陽盛皆客氣所以反曰旅也旅之上九得勢而主權者寄一身於炎炎之上而不知有焚巢之禍九三趨炎而燥進而不知有焚次之災六二九四雖以柔道而旅或懷資或得斧獲利于時而二必以身而後免過四之心尤不快也豈非戒旅以求利之事乎若六五者始以離雉有文明之美而射之而亡其矢而不獲是道不行而利不得也巽以陽為牀簀而以隂為牀足者以牀下有足之象四陽列行有簀之象也九二牀之東壁而上九牀之西壁也故皆云巽在牀下以牀足附之也九五為龍飛而為虎變者也飛龍為甲虎變為庚是以一氣之變更耳上九喪斧剛過也九二用史巫剛中而未得位也九三之頻蹙又無位而失中也由是觀之則權以有位而得中者行矣非九五而誰乎坎之初六主於冬至離之初九主於夏至震兊之初則主於春秋之分也故以兊之下二爻陽氣猶盛為七月之象中二爻隂陽中分為八月之象上二爻隂過於陽為九月之象此兊卦所以四爻為言商兊以見震角離徴坎羽之音五爻言孚剝以見震夬離姤坎復之理也一陽生於子而六陽亢於巳子屬坎而已屬巽以巽重坎所以為渙也渙者散也卦氣當夏至之後大暑之前也是陽氣散於外也陽雖散於外而有生生不窮者在其中是坎中之一陽也一元之氣育而為形是坎中之二隂也陽主氣隂主形一陽散於外故言汗血也二隂分於中故言羣躬也躬分而為四支羣分而為五臟六腑形也是皆一元之氣分散而成也人之生也本於元氣元氣出於坎水是為天一之精也蒸而為汗流而為血以養四肢五臟巽之上爻兊之下爻變皆成坎坎氣蒸上為巽木之枝葉潤也坎氣下濡為兊澤之中聚水草也澤水竭則為困矣是水下泄也兊之一陽下泄則有戒欲之象坎之一隂上缺則有戒嗜之象戒欲不出户庭戒嗜故云甘苦之味初爻言不出户庭無咎二爻言不出門庭凶者是戒欲之義也初爻變為坎天一之水是為真精之原君子能知通塞之理愼密而不出閉其精户是養生之要也坎二則火也門庭者是開竅為心也心火貴乎下濟於水心明貴乎外明於物不出則失中道矣亦戒欲之義也六三言嗟者悔歡而不節六四言安者安於能節是皆明告利害於人也養生之道盡此一卦中孚生陽羽族卵生也咸卦生隂血肉之物胎生也故中孚為生陽之始小過為生陽之成也鳥雀四時生卵而春盛故為立春之象冬至之卵焉中孚有鳥卵之象鳥炎上之性必以豚魚而後吉豚魚潤下之物也北方子位豚魚之地也小過之飛鳥離之凶者由東行而中南方之網罟也網罟取離陽至離而太盛隂氣生矣黃帝之律吕分為乾坤妃為坎離乾坤即分六隂六陽坎離則成既濟未濟坎中之陽將升而至於仲吕辟卦為乾是謂乾盈九不見其首離內之隂已入於坎至於應鍾辟卦為坤是謂坤虛十以導潛龍之氣既濟之首乾之首也未濟之尾坤之尾也乾尾續於坤尾九而後十也坤首繼於乾首二而先一也上經卦三三敘而九下經卦六三敘而十八履十謙十五復二十四恆二損十一益十二困十七井十八巽二十七九卦之數總一百三十有六凡三求之四百有八也周天三百六十成數也餘四十八隂陽所以進退也陽進於乾六月各四十八復至乾也隂退於坤六月亦四十八姤至坤也此九卦數之用也男女合者上下經惟十二位正位乾坤坎離咸恆損益八卦分為十八位乾坤變頤大過頤大過變坎離坎離變中孚小過中孚小過變咸恆成人倫也六十四卦一隂一陽始乾終坤先自乾坤一隂一陽排六十四次自乾坤一陽二隂次四陽四隂次十六陽十六隂次三十二陽三十二隂即成六十四卦也故曰一隂一陽之謂道陽卦以竒為君故一陽而二隂陽為君隂為民也隂卦以偶為君故二陽而一隂隂為君陽為民也陽一畫為君二畫為民其理順故曰君子之道隂二畫為君一畫為民其理逆故曰小人之道震坎艮陽卦也曷為而多隂自坤而索也其卦皆一陽二隂凡五也故曰陽卦竒巽離兊隂卦也曷為而多陽自乾而來也其卦皆一隂二陽凡四也故曰隂卦耦以三因天地十五數得四十五以五因天地十五數得七十五以七因天地十五數得一百五九宫數止一百五故百六為極數用三五七者取陽數中者用之乾職生覆坎司寒化艮司濕化震司動化巽司風化離司暑化坤職形載兊司燥化坎北震東乾西北艮東北四卦皆陽也離南兊西巽東南坤西南四卦皆隂也故曰方以類聚一聚於六而分乾坎四聚於九而分坤兊二聚於七而分離巽三聚於八而分震艮故曰物以羣分得朋則吉乖類則凶此吉凶所以生也子者乾之始而終於己午者坤之始而終於亥陽爻二百九十二畫數也其數一千七百二十八隂爻一百九十二夜數也其數一千一百五十二總而言之二千八百八十以四求之合萬有一千五百二十故曰通乎晝夜之道而知雜卦者雜揉衆卦錯綜其義以暢無窮之用故其義專以剛柔升降反覆取義與序卦不同故韓康伯云或以同相類或以異相明雜六十四卦以為義是也一𤣥生三方用三乘一三方生九州用三乘三九州生二十七部用三乘九二十七部生八十一家用三乘二十七八十一家生二百四十三表用三乘八十一二百四十三表生七百二十九贊用三乘二百四十三七百二十九贊生二萬六千二百四十四策用三十六乘七百二十九凡一𤣥為一歲七十二策為一日起十一月皇一一元之元日之日乾之乾一二一㑹之元月之日兊之乾十二一二元之㑹日之月乾之兊十二二二㑹之㑹月之月兊之兊一百四十四一三元之運日之星乾之離三百六十二三㑹之運月之星兊之離四千三百二十一四元之世日之辰乾之震四千三百二十二四㑹之世月之辰兊之震五萬一千八百四十一五元之歲日之石乾之巽一十一萬九千六百二五㑹之嵗月之石兊之巽一百五十五萬五千二百一六元之月日之土乾之坎一百五十五萬五千二百二六㑹之月月之土兊之坎一千八百六十六萬二千四百一七元之日日之火乾之艮四千六百六十五萬六千二七㑹之日月之火兊之艮五萬五千九百八十七萬二千一八元之辰日之水乾之坤五萬五千九百八十七極萬二千二八㑹之辰月之水兊之坤六十七萬一千八百四十六萬四千三一運之元星之日離之乾三百六十四一世之元辰之日震之乾四千三百二十三二運之㑹星之月離之兊四千三百二十四二世之㑹辰之月震之兊五萬一千八百四十三三運之運星之星離之離一十二萬九千六百四三世之運辰之星震之離一百五十五萬五千二百三四運之世星之辰離之震一百五十五萬五千二百四四世之世辰之辰震之震一千八百六十六萬二千四百三五運之嵗星之石離之巽四千六百六十五萬六千四五世之歲辰之石震之巽五萬五千九百八十七萬二千三六運之月星之土離之坎五萬五千九百八十七經萬二千四六世之月辰之土震之坎六十七萬一千八百四十六萬四千三七運之日星之火離之艮一百六十七萬九千六百一十六萬四七世之日辰之火震之艮二千一十五萬五千三百九十二萬三八運之辰星之水離之坤二千一十五萬五千三百九十二萬四八世之辰辰之水震之坤二萬四千一百八十六萬四千七百四萬五一歲之元石之日巽之乾一十二萬九千六百六一月之元土之日坎之乾一百五十五萬五千二百五二歲之㑹石之月巽之兊一百五十五萬五千二百六二月之㑹土之月坎之兊一千八百六十六萬二千四百五三歲之運石之星巽之離四千六百六十五萬六千六三月之運土之星坎之離五萬五千九百八十七世萬二千五四歲之世石之辰巽之震五萬五千九百八十七萬二千六四月之世土之辰坎之震六十七萬一千八百四十六萬四千五五歲之歲石之石巽之巽一百六十七萬九千六百一十六萬六五月之歲土之石巽之坎二千一十五萬五千三百九十二萬五六歲之月石之土巽之坎二千一十五萬五千三百九十二萬六六月之月土之土坎之坎二萬四千一百八十六萬四千七百四萬五七歲之日石之火巽之艮六萬四百六十六萬一千七百六十萬六七月之日土之火坎之艮七十二萬五千五百九十四萬一千一百二十萬全五八歲之辰石之水巽之坤七十二萬五千五百九十四萬一千一百二十萬六八月之辰土之水坎之坤八百七十萬七千一百二十九萬三千四百四十萬七一日之元火之日艮之乾四千六百六十五萬六千八一辰之元水之日坤之乾五萬五千九百八十七萬二千七二日之㑹火之月艮之兊五萬五千九百八十七萬二千八二辰之㑹水之月坤之兊六十七萬一千八百四十六萬四千七三日之運火之星艮之離一百六十七萬九千六百一十六萬八三辰之運水之星坤之離二千一十五萬五千三百九十二萬七四日之世火之辰艮之震二千一十五萬五千三數百九十二萬八四辰之世水之辰坤之震二萬四千一百八十六萬四千七百四萬七五日之歲火之石艮之巽六萬四百六十六萬一千七百六十萬八五辰之歲水之石坤之巽七十二萬五千五百九十四萬一千一百二十萬七六日之月火之土艮之坎七十二萬五千五百九十四萬一千一百一十萬八六辰之月水之土坤之坎八百七十萬七千一百二十九萬三千四百四十萬七七日之日火之火艮之艮二百一十七萬六千七百八十二萬三千五百八七辰之日水之火坤之艮二千六百一十二萬一千三百八十八萬二千七八日之辰火之水艮之坤二千六百一十二萬一千三百八十八萬二千圖八八辰之辰水之水坤之坤三萬一千三百四十五萬六千六百五十八萬四千圖月亥星三百六十辰六十三萬七千四百四十十二音卓中宅直柝丑茶呈凡性之序先列十純十純既浹其次降一其次降二其次降三其次降四最後五配而性備矣始於純終於配天地之道也造化之一氣即聖人之一心也造化之氣本於發生而聖人之心亦將以濟世也故不免由靜以之動自無而入有使萬物得以遂其生安其業天下之人終不見其迹者其故何哉蓋造化之氣與聖人之心雖動而不離靜雖有而不捨無彼萬物與萬物巳齊見役說戰勞於其間而不自覺知耳此八卦之序所以出乎震成乎艮也謂之帝者豈非造化之氣與聖人之心一乎大易象數鉤深圖卷下
