body:
  text: 大易象數鈎深圖卷上右太極圖周敦實茂叔𫝊二程先生茂叔曰無極而太極太極動而生陽動極而靜靜極復動一動一靜互為其根分隂分陽兩儀立焉陽變隂合而生水火木金土五氣順布四時行焉五行一隂陽也隂陽一太極也太極本無極也五行之生也各一其性無極之真二五之精妙合而凝乾道成男坤道成女二氣交感化生萬物萬物生生而變化無窮焉舊有此圖太極未有象數惟一氣耳一氣既分輕清者上為天重濁者下為地太極生兩儀也兩儀既分則金木水火四方之位列兩儀生四象也水數六居坎而生乾金數九居兊而生坤火數七居離而生㢲木數八居震而生艮四象生八卦也乾三畫而為天者以一含三也坤六畫而為地者耦三而為六也天一地二之本數天竒地耦之本畫不待較而可知然妙理在乎一含三二含六耳乾一含三故索為三男而皆竒坤二含六故索為三女而皆耦此天地生成之理豈不妙哉震為雷雷出於地下故一陽在下坎為水水畜於地中故一陽在中艮為山山形於地上故一陽在上然陽動隂靜以動為基者故動震是也以靜為基者故止艮是也動者在中非內非外故或流或止或動或靜焉此坎所以為水巽為木木發生於地下故一隂亦在下離為火火出於木中故一隂在中兊為澤澤鍾於地上故一隂在上然隂柔而陽剛故木也始弱而終強陽在末也陽明而隂晦故火也外明而內晦陽在外也陽燥而隂潤故澤也外潤而內燥陽在內也或問澤內燥何也愚曰內燥則能生金外潤則能鍾水金所以能生水土所以能生金者即澤而知之也聖人豈茍之哉一陽生於子二陽在丑三陽在寅四陽在邜五陽在辰六陽在已而乾位在西北居子之前故曰乾知大始言乾以父道始天地也一隂生於午二隂在未三隂在申四隂在酉五隂在戌六隂在亥而坤位在西南蓋西南方申也物成於正秋酉也坤作於申成於酉故曰坤作成物自一至十天尊於上地卑於下尊者乾之位故乾為君為父為夫卑者坤之位故坤為臣為母為婦皆出於天尊地卑之義也故曰天尊地卑乾坤定矣乾元用九參天也坤元用六兩地也故曰參天兩地而倚數九六者止用生數也戴九履一左三右七二四為肩六八為足五為腹心總四十五縱橫數之皆十五也天五居中央聖人觀之遂定八卦之象河圖之數四十五蓋聖人損去天一地二天三地四凡十數獨天五居中而主乎土至洛書則有土十之成數故水火金木成形矣繫辭曰易有太極是生兩儀兩儀生四象四象生八卦其四象在乎天一地二天三地四天五天一居北方坎位為水地二居南方離位為火天三居東方震位為木地四居西方兊位為金此在四正之位而為生數也天五居中央則是五土數也土無定位然後分王四正之方能生萬物故北方水一得土五而成六南方火二得土五而成七東方木三得土五而成八西方金四得土五而成九此謂之四象也河圖有天一地二天三地四為象之始至於天五則居中而主乎土變化但未能成形謂之四象矣至於洛書有土十之成數故水火金木皆相竒耦而成形矣故河圖合四象之數可以定八方之位洛書有五行之數可以備八卦之象也是象生其卦必俟天之變而備於洛書土十之成數而後成八卦矣二者相需方能成卦此八象者始由四象所生也伏羲氏先按河圖有八方將以八卦位焉次取洛書土十之成數將以八卦象焉乃觀隂陽而設竒耦二畫觀天地人而設上中下三位以三畫純陽則為乾以六畫純隂則為坤以一陽處二隂之下不能屈於柔以動出而為震以一隂處二陽之下不能犯於剛乃復入為巽以一陽處二隂之間上下皆弱罔能相濟以險難而為坎以一隂處二陽之中上下皆強足以自託乃麗而為離以一陽處二隂之上剛以馭下則止而為艮以一隂處二陽之上柔能撫下則說而為兊乾陽之位共十二畫謂乾三爻震坎艮各一爻巽離兊各二爻共十二畫也坤隂之位共二十四畫謂坤六畫巽離兊各一畫震坎艮各二畫計二十四畫也陽爻君道也故得兼之計有三十六畫所以四九三十六畫陽爻則稱九也坤臣道也不得僣上故四六二十四畫所以隂爻則稱六也故乾三畫兼坤之六畫成陽之九也陽進而乾元用九矣隂退而坤元用六矣合此餘九六者蓋天地剛柔之性也此天地之數十有五也或統而取之其㫖有六蓋合自然之數也且其一者始就河圖縱橫之皆十五數也其二者蓋天一地二天三地四天五凡十五數也其三者以其太極未分混而為一即是一也一氣判而為儀見三也二儀分而為象見七也四象演而生八卦見十五數也其四者謂五行之生數是一水二火三木四金五土見十五數也其五者將五行之數中分為之以象隂陽則七為少陽八為少隂亦見其十五數也其六者以少隂少陽不動則不能變亦且入為少隂隂動而退故少隂動而為盛隂所以退稱六也七為少陽陽動而進故少陽動而為盛陽所以進稱九也六與九合亦見其十五也斯蓋一三五陽位為二四間而五居中然配王四方也如六七八九合而周以為四象也天一下降與地六合而生水於北地二上駕與天七合而生火於南天三左旋與地八合而生木於東地四右轉與天九合而生金於西天五冥運與地十合而生土於中以竒生者成而耦以耦生者成而竒天陽也故其數竒地隂也故其數耦竒耦相合而五十有五之數備大衍之數減其五者五行之用也虛其一者元氣之本也蓋天五為變化之始散在五行之位故中無定象天始生一肇其有數也而後生四象五行之數今焉虛而不用是明元氣為造化之宗居尊不動也六位以二三四五為經七八九六為緯者象天文也天以龍虎鳥龜為經辰歲熒惑太白為緯六位之經無𤣥武之數者北望惟見斗樞辰極也故斗謂之北斗辰謂之北辰雖名曰北而實天中是一六太極之數潜宿於五也河圖六一居亥子之北五居中央是中央與北皆得太極之數也六位之緯無鎮星之數者鎮星二十八載一周天歲熒惑太白辰皆歷鎮星所鎮之宿而行如隂陽家所謂土居中宫王四季之說也故易爻凡三百八十四上契天象之數而吉凶之變占於七八九六如五星之變焉右伏羲八卦圖王豫𫝊於邵康節而堯夫得之歸藏初經者伏羲初畫八卦因而重之者也其經初乾初奭坤初艮初兊初犖坎初離初釐震初巽卦皆六畫即此八卦也八卦既重爻在其中鄭氏云古先天圖揚雄太𤣥經關子明洞極魏伯陽參同契邵堯夫皇極經世而已惜乎雄之太𤣥子明之洞極倣易為書泥於文字後世忽之以為屋上架屋頭上安頭也伯陽之參同契意在於煆鍊而入於術於聖人之道又為異端也堯夫擺去文字小術而著書天下又不願之但以為律厯之用難矣哉四家之學皆出於古先天圖先天圖其易之源乎復無文字解注而世亦以為無用之物也今豫作方圓圖注腳比之四家為最簡易而四家之意不出於吾圖之中於易之學為最要伏羲仰觀天文以畫八卦故日月星辰之行度運數十日四時之屬凡麗於天之文者八卦無不統之伏羲俯察地理以畫八卦故四方九州鳥獸草木十二支之屬凡麗於地之理者八卦無不統之乾陽居上坤隂居下乾自震而左行坤自巽而右行天左地右故曰剛柔相摩震蕩艮兊蕩坤離蕩巽坎蕩乾八卦往來迭相推蕩京房曰蕩隂入陽蕩陽入隂蓍之數七也七而七之其用四十九故其德圎卦之數八也八而八之為别六十四故其德方圓者運而不窮可以逆知來物方者其體有定可以識乎既往故圓象神方象知本乾九二爻變成同人次變無妄次變益次變頤終其變至離而止本坤六二爻變成師次變升次變恆次變大過終其變至坎而止故上經始於乾坤終於坎離焉本咸六二爻變成大過次變困次變坎次變師次變蒙而終於未濟本恆初六爻變成大壯次變豐次變震次變復次變屯而入既濟故下經始於咸恆終於既濟焉大易象數鉤深圖卷上
