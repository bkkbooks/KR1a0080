body:
  text: 大易象數鈎深圖卷中元張理撰十一月復一陽生黃鍾氣應至四月六陽為乾故闢戶謂之乾五月姤一隂生蕤賔氣應至十月六隂為坤故闔戶謂之坤復十二世臨二十四世泰三十六世大壯四十八世夬六十世乾七十二世姤八十四世遁九十六世否一百八世觀一百二十世剝一百三十二世坤一百四十四世乾一變姤二變遁三變否至五變為剝而止物不可以終盡剝窮上反下故受之以復坤一變復二變臨三變泰至五變為夬而止夬必有遇故受之以姤一陽來復變臨為二陽變至泰為四陽變至大壯為八陽變至夬為十四陽終其變於歸妹成十六陽一隂始姤變遁為二隂變至否為四隂變至觀為八隂變至剝為十四隂終其變於隨成十六隂一升而合九歸五為君十降而合六歸二為臣此之謂陽卦順生也一降而合九歸五為君十升而合六歸二為臣此之謂隂卦逆生也乾坤者數之一二也形之方圓也氣之清濁也理之動靜也故乾具兩儀之意而分上下坤包四象之體而分南北東西兩儀四象共數有六并其乾坤之本體則八卦之數周備矣此乾坤所以去太極未逺內貞外悔兩儀之理也元亨利貞四象之道也二三四五以為經七八九六以為緯八卦之方也所以自一而二自二而四自四而八自八而十六自十六而三十二自三十二而六十四六十四而天道備矣歲功成矣人事周矣此易故六十四卦而乾坤居首也學者能由六十四卦以歸一由一以悟太極則伏羲文王孔子皆備於我成變化行鬼神亦是道也童蒙在五擊之在上是外學也耳目所入雖足以資吾適足以賊吾之真性故不利為寇也包蒙在二發之在初是內學也心之所造貴於幾先一著於心便成機械所以脫桎梏吝也利者吾心之桎梏乎坎中之陽以為助乾卦之陽求待上一陽而為之援一隂避之而興進一隂阻之而復退此所以為需之吉凶也然聖人之意不責於二隂而責於二陽不責於三陽而責於坎中之陽權所在也故責之重也遂係之以酒食之象焉酒食者養人之具也人之所求待也為酒食之所困而為害者亦有之也始貪其利終罹其害者小人之常也必有道以處之所貴乎貞吉也貞者中正之義內中正則外固外固則不陷矣乾居亥位坎起子方亥子皆北皆屬於水始無所爭也一離於形則天西傾水東注天上蟠水下潤於是而訟矣坤為衆而師亦為衆者師統衆之義也統衆者非德則不可故以乾之九二入於坤為師以乾德在二也律因數起數自中出黃鍾之律起為度量衡差之毫釐則不可也北方之坎黃鍾之本也故繇言丈人爻言律丈與律法度之出非有德者乎北主幽隂殺伐之象南主嚮明朝會之象六爻分二三四五之數二居南方離明之地也故以比為南面五居中央非北也天北望惟見斗樞辰極辰曰北辰斗曰北斗雖名曰北實中天也師北向故有五人為伍之意比南面故有五等分爵之象上居五位後其君者也故曰後夫凶巽居東南之方乾氣自子至於已入於巽方為巽所畜名曰小畜以隂生於巽巽隂之微也故曰小艮居東北方乾氣自子至寅入於艮方為艮所畜名曰大畜者陽終於艮艮陽之究也故曰大自子至寅三畫之乾也自子至巳六畫之乾也是艮畜乾貞巽畜乾悔也大畜之所以得權者變小畜之九五而六五耳謙虛下人所以得權而畜人也小畜之所以朱權者變大畜之六五而九五耳滿假自大所以失權而為人所畜也乾亥位初爻本室壁二爻方起奎奎繫之者見其履虎尾也坤居申位參本坤之初爻以參繫兊者見虎尾之嘻人也乾居兊下則無履虎嘻與不嘻之象矣以乾乘兊所以履虎之象明也履卦自兊入乾由戌達亥以人應天之道乎觀泰之象則見否之所生觀否之象則見泰之所起是隂陽之氣上下升降以成象也故否泰之卦皆曰往來乾居上三十六策變其中爻則同乎離離居下二十四策變其中爻則同乎乾是謂二人同心言外貌不同而心同也大有之卦衆陽盛時而五以六居之人君體元以居正可不知守位之仁乎推而明之四為侍從則曰匪其旁三為三公則曰公用享於天子二為侯牧則曰大車以載初逺於君位有要荒蠻夷之象則曰無交害皆發政施仁之道也如是則福及宗廟而永有萬世之業矣艮居寅屬木仁也坤居申屬金義也故五上有殺伐之象謙者以至誠為本也言心聲也不情之言則不出於誠非心之本也是為僞也故鳴謙居中者為至誠居外者為不情是以謙而內好勝也震居坤下是謂一陽之復天地之心也今出於坤上是謂出治之豫亦天地之心也坤中之爻靜中之靜也故曰介于石震中之爻動中之靜也故曰貞疾恆不死自震逹兊由東徂西春作秋成之義也夫是之謂隨陽自隂中而起隂隨陽動也隂來迎陽而說之陽隨隂聚也故兊之上爻有羈縻之象巽居已位金之所生也至酉金王而巽之功成矣故巽五爻言庚今在艮下猶居寅位木之鄉也故言甲甲庚分子午之位循環無窮行權之道也金剋於木今居於木下是蠧生於木中也有蠱自然之象上九居山之髙有髙上之志足以振蠱壞之風使懦夫有立焉臨卦之象本指為人主者以臨乎下也臨下之術在施德於下而存心於上施德於下則二陽在下如天氣感地焉存心於上則行中以智而敦朴為先如髙明柔克焉彼兊口之甘是區區能言而不能行如王者空降詔諭丁寧而仁澤實不行也何足以論施德存心之道哉四隂生隂侵陽之卦也比之於陽侵隂乃大壯之理也不曰小壯而曰觀者隂順巽而無侵陽之意也下既順巽上必以中正然後足以使下觀而化焉下觀而化矣則安有侵陽之事乎噬嗑本以口為象而趾鼻耳目亦繫之者蓋一身賴口以為養也養之有道噬嗑之福養不以道噬嗑之禍禍多福少小人貪嗜者多也噬嗑先電而後雷電揚而雷震舌動而齒咀此自然之理也噬嗑與賁皆頤中有物一為賁一為噬嗑者噬嗑得頤之下動賁得頤之上止惟下動則噬嗑矣柔文剛以成離離為日日運於天其亨之意也剛文柔以成艮艮山也山不動而雲出為雨木伐以為用其小利有攸往乎然孔子皆謂之天文而不及地者蓋觀象以作彖也象有日月遡明之象也日月因遡明而合朔朔晦相循而四時成矣此所以察時變也離有繼明之意而賁變離之四爻日月相抱持也此所以為天文之要道焉復卦之下陽即剝之上陽落於地也故有碩果不食之象其陽氣之種乎所以乾為木果而生木於亥也亥者乾之位也木有生而未芽芽則生子者孳也未芽之果本於剝上之陽如果在木末焉爻位者實數之六也太極者虛數之六也虛數之六本於含三之積算含三之積算本於圜物之徑一故天下之數十百千萬莫不出乎六六數進則為七退則為五是五為六之未盈六為五之已滿過則為七矣六為極矣一陽生則七日來復也二陽生則八月有凶也七為少陽八為少隂日為震月為兊臨雖陽長而實得八兊之數也故曰有凶於八月也復卦一陽來復曰七日者蓋坤隂極於亥六數盡於一復出於坎并而得七也數周六甲運周三統而復為元亦七日來復之義云耳中孚信也而旡妄亦信也中孚之信其自然之誠也無妄之信是或使之也故曰剛自外來而為主於內誠信之道本自中出而中者亦中之為主也今反自外來而為內主安得自然哉此所以異乎中孚也頤中虛虛則靈龜之象君子見之以靈龜自警小人見之以朵頤垂涎三為下齒噬之動者也故凶甚於二五三之所以動者因初有震象耳大過一卦吉凶在初與上也棟之隆以應藉地之茅慎之至也棟之橈以應滅木之水乃大過也故大過之繇辭見於九三也陽氣驕為大者過九二配以少隂故能發生枯楊之梯者楊之芽枿耳九五配以老隂發生之理窮矣遂有枯楊生華象象楊不能結實為萌芽也坎之彖曰維心亨是心無善惡之思無喜怒哀樂之動一入於習則同者變為異也故坎卦始終象小人習險以自陷其身戒人用心之惡也且隂陽者善惡之端也動靜之分也心之動則惡萌矣陽動而隂靜陽善而隂惡六三以隂居陽所以為惡之大也又陷於二隂之中是染習皆惡也六四以隂居隂靜之至也是復性而反誠也又居於二陽之間是染習皆善也故樽酒簋二用缶有簡率敦朴之象二五雖以陽中然未免陷二隂之黨染習之氣不能免也孔子所以指之以未出中中未大之象也下卦離之貞也上卦離之悔也是下卦為貞明而上卦為繼明也月者遡日以明也合朔之時月包於日而後遡其明也此上卦所以包下卦有日月遡明之象也離為日而不為月在重離則月象生焉故曰明兩也又曰日月麗乎天也六二黃離是自中而明也所謂誠明之性也六五有哀悲之象者是既望之月而將逺於日也亦明極而晦生也一氣居中故澤之雲蒸於山而山之泉入於澤是山澤之相感也卦有三陽而九四居中中心象也惜乎朋於二陽未免有意有必有固有我故憧憧而往來也九五上連於上六是用在上六也故上六為頰舌而五為脢九三下連於六二是用在六二也故六二為腓而三為股股隨腓而動脢則不隨頰舌以發言此吉凶所以異也六爻惟取九二一爻得一剛一柔之道而居中孔子與之以能久中之象六五雖一剛一柔而居中然與共天位者亦柔也故有婦人之貞從一之象所以異於二矣九三以剛居剛動而過中不恆之象固不待言也初上二爻一浚以趨下一振而向上皆迷塗之甚者不得其中故凶二以中順之德而取象於黃牛牛之所以能負重者革之堅也牛無革則機上肉耳何能為哉九三以剛居外有革之象三茍隨乾以遁則二遇禍矣此所以勸其執之也四隂以九居之下應於初六故曰好好者交好也是隂位下交於隂爻也五陽以九居之下應於六二故曰嘉嘉妃也是陽位之陽爻下妃於隂位之隂爻也隂妃於我交於我小人不可交則與之絶此所以吉矣妃則吾正偶耳是不能絶也故但正其志焉吾之志正則淫邪非僻不能入矣此所以為貞吉云大壯之卦下纍四陽有棟宇基兆之象故云壯也其卦上震下乾震為蒼筤竹故有藩象乾之九三變則入兊故有羊象兊西而震東卯有正衡故有羊觸藩之象初者羊之足趾也羊以角觸而趾用其力角羸則趾困矣九四實吾之同類茍決其藩以開大塗容羊進而羸之則下三陽反為壯輿之輹矣此九二九四所以有貞吉之繇矣八卦之象乾實為馬晉以坤之貞而隂爻居五位豈有馬象哉蓋乾錫之馬耳因錫馬以致蕃庶諸侯之象明矣易以明出地上象諸侯者以火在天上為大有象天子故耳天子與諸侯皆南面之君也必有明德以安民民安則位安矣故曰康侯也明夷之卦聖人贊之以彖象最顯最著於人事最明五為箕子則上為紂矣九三有南狩而得大首之辭豈非武王乎拯馬壯者又豈非武王之輔相亂臣乎六四本坤畫而下與三同居人位又豈非微子太公之歸周乎初九與上六同乎坎水將飛而翼垂將行而餱糧不繼豈欲拯之而力不能如伯夷叔齊之徒乎或問文中子家人之象子曰明內而齊外蓋離巽之卦也然象在一隂一陽相妃於中有父母夫婦之象意本於夫子之彖焦延夀以上爻為宗廟五為君今用之於家人則君位為父矣孔子曰家人有嚴君焉父母之謂也睽之為卦六爻相疑者隂陽相疑也陽居隂位是以位相疑二應五而五連於上上應三而三連於二是以應相疑疑則睽而不合矣故聖人於六爻之辭莫不解其疑也而使隂陽各安其位焉所以睽卦物象比之他卦最盛蓋欲盡意而已蹇之二陽皆陷於隂中故曰蹇蹇之象往來者四而不係往來之象者二四者皆失中而二者皆得中也聖人得中道以自養故雖處蹇中而素患難行乎患難也何往來之有五在上位之中是得中而居上者也善處蹇而不陵下使人樂歸之此所以致朋來而不終孤立於險中矣二在下位之中是得中而居下者也善處蹇而不援上匪其躬而自任其責此所以致終無尤過而獲應於上矣三陽之失中也故勸之反身修德也四隂之失中也故勸其連接乎二陽也初在下故勉之以養其聲譽而無茍往上近五故朂之以就於充實而從大人如四之連耳坎中之一陽即震下之一陽始包於坎中既而出於坎上動而震上也若果核之仁變而為芽也故曰得黃矢者中直也中直則芽達矣解之為卦隂陽悖亂而不當其位上爻故有解悖之象震之在坎也君子屈蟄於下混迹於小人之時而發生敷布之心不忘也一旦脫迹而去遂伸其志此九四之與六三所以有解拇象二卦之彖皆言與時偕行二卦之爻皆言十朋之龜言時者謂時當損而損天下不以為儉嗇當益而益天下不以為驕奢也言龜者謂龜筮協從臣民無逆也五陽而決一隂五君子而去一小人不為難矣然隂附五位五與四皆屬之是謂兊卦所謂包陽之隂挾君子之小人所以難決難去耳大壯之羊施壯於震震同類也夬之羊施於兊兊非類也變坎則與同此四爻所以有牽羊之象此三爻變有羊象耳初於本爻觀之則有豕象而九三突其臀初於四觀之則有魚象言陽包隂也於九五觀之則有瓜葛滋長之象姤本乾也一隂變其初有龍反化魚象龍化魚而角無用矣此姤之角所以上窮也乾之一陽起子而終於已已實居巽方是乾之六陽與巽相遇於巳位而巽之一隂遂萌矣此一隂之生故名曰姤也萃之成卦則物各以類聚而陽居南面之位一為天子一為諸侯下統三公二十七大夫八十一元士上奉宗廟之嚴防衆亂之道寄於初爻懲失衆之象寓於上畫萃者物之秋成而後萃也秋本主於兊兊卦本以上爻為主今西南之坤氣運至西方而陰畫衆矣故二陽統之而上爻失衆焉巽下之一隂與坤之三隂一體也隂沈滯而陽升騰升騰者二陽也初附二陽而升二陽又與之一體故有允升之象允者見信於人坤用事於亥而亥亦木之生而未成形者也至於子位則震居坤下震亦木也是木之始芽根耳若巽居坤下則有二陽非震一陽之比故曰升也升居丑位及乎卯則木王矣外卦以位言也而五天位是不可以階升也然貞者正也堯舜禹湯升天位以正如升階焉不以貞者寧免於顛躋乎大易象數鈎深圖卷中
