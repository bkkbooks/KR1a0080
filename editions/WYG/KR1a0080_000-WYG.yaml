body:
  text: 大易象數鉤深圖易類提要臣等謹案大易象數鉤深圖三卷元張理撰理字仲純清江人延佑中官福建儒學提舉是書上卷太極圖即周子之圖其八卦方位圖則本乎説卦又有乾知大始坤作成物參天兩地及大衍五十五數諸圖又有仰觀俯察剛柔相摩八卦相盪諸圖而皆溯原于河洛中卷天地數萬物數二圖仍即大衍䇿數又有元㑹運數乾坤大父母復姤小父母八卦生六十四卦八卦變六十四卦圖又有反對變與不變諸卦圖以下則六十四卦之圖分見于中下二卷而參伍錯綜序卦襍卦皆為之圖葢純主陳搏先天之學朱子所謂易外别𫝊者也其書初少𫝊本通志堂經解所刻與劉牧之書均從道藏録出諸家著録卷帙亦復不同朱睦㮮授經圖載理之書有周易圖三卷易象數鉤深圖六卷易象圖説六卷焦竑經籍志書目與授經圖同而鉤深圖則作三卷朱彞尊經義考止載易象圖説六卷而不載此書葢由未見其本但據書目𫝊鈔故輾轉岐誤白雲霽道藏目録以易數鉤隠圖與理此書並屬之劉牧亦由但據標題繕録未及核作者之異同今以徐氏刻本定著為三卷併詳考舛異之故以祛來者之疑焉乾隆四十六年十二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:b4d2ce4c5a0bbd85601f840122c99ecf1dc98067d56b472447975dc841d8b789
